name: ccpc-backend打包部署

on:
  push:
    branches:
      - master

jobs:
  build:
    if: github.repository == 'NEUQer-Tech/ccpc-backend'
    runs-on: ubuntu-latest
    steps:
    - name: 拉取最新提交的代码
      uses: actions/checkout@v4
    - name: 设置jdk21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: 运行与分析测试用例
      run: |
        cd ./
        mvn clean test 

    - name: 项目打包
      run: |
        cd ./
        mvn package

    - name: 删除旧的jar包
      run: sshpass -p ${{secrets.REMOTE_PWD}} ssh -o StrictHostKeyChecking=no root@${{secrets.REMOTE_IP}} "cd /docker/apps/ccpc/ccpc-backend && rm -rf ./*.jar"

    - name: 上传jar包到服务器中
      run: sshpass -p ${{secrets.REMOTE_PWD}} rsync -avz -e "ssh -o StrictHostKeyChecking=no" ./target/ccpc-backend-0.0.1-SNAPSHOT.jar root@${{secrets.REMOTE_IP}}:/docker/apps/ccpc/ccpc-backend

    - name: 启动项目
      run: sshpass -p ${{secrets.REMOTE_PWD}} ssh -o StrictHostKeyChecking=no root@${{secrets.REMOTE_IP}} "cd /docker/apps/ccpc/ccpc-backend && chmod +x run.sh && ./run.sh"
